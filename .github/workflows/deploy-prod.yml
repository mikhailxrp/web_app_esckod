name: Deploy PROD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /apps/esckod-prod
            git pull origin main
            npm ci
            npx prisma migrate deploy
            npm run build
            pm2 restart esckod-prod || pm2 start /root/.nvm/versions/node/v20.20.2/bin/node --name "esckod-prod" -- /apps/esckod-prod/node_modules/.bin/next start -p 3000
            pm2 save
